server:
  port: ${SERVER_PORT:8081}
  shutdown: graceful
spring:
  application:
    name: auth-service
  lifecycle:
    timeout-per-shutdown-phase: 30s
  r2dbc:
    url: ${R2DBC_URL:r2dbc:postgresql://localhost:5432/auth_db}
    username: ${DB_USERNAME:marketplace}
    password: ${DB_PASSWORD:marketplace}
    pool:
      initial-size: 2
      max-size: 20
      max-acquire-time: 5s
  flyway:
    url: ${FLYWAY_URL:jdbc:postgresql://localhost:5432/auth_db}
    user: ${DB_USERNAME:marketplace}
    password: ${DB_PASSWORD:marketplace}
    locations: classpath:db/migration
marketplace:
  security:
    jwt:
      keystore: ${JWT_KEYSTORE:classpath:keys/dev-jwt.p12}
      store-password: ${JWT_STORE_PASSWORD:changeit}
      key-password: ${JWT_KEY_PASSWORD:changeit}
      alias: ${JWT_KEY_ALIAS:marketplace-jwt}
      issuer: ${JWT_ISSUER:http://localhost:8081}
      audience: marketplace-api
      access-token-ttl: 15m
  bootstrap:
    admin:
      enabled: ${BOOTSTRAP_ADMIN_ENABLED:false}
      email: ${BOOTSTRAP_ADMIN_EMAIL:}
      password: ${BOOTSTRAP_ADMIN_PASSWORD:}
management:
  endpoints.web.exposure.include: health,info,prometheus,metrics
  endpoint.health.probes.enabled: true
logging.structured.format.console: logstash
