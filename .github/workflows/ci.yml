name: ci
on:
  push:
    branches: [main]
  pull_request:
permissions:
  contents: read
jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '25'
      - uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '9.5.1'
      - run: gradle clean check javadoc --no-daemon
      - run: python3 scripts/static-verify.py
      - uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: '**/build/reports/**'
  docker-build:
    runs-on: ubuntu-latest
    needs: build-test
    strategy:
      matrix:
        module: [api-gateway, auth-service, catalog-service, cart-service, inventory-service, order-service, payment-service, shipping-service, audit-service, external-payment-simulator]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          build-args: MODULE=${{ matrix.module }}
          tags: amazon-saga-marketplace/${{ matrix.module }}:ci
