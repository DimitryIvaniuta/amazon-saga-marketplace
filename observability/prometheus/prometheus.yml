global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    environment: local

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  - job_name: marketplace-services
    metrics_path: /actuator/prometheus
    static_configs:
      - targets:
          - api-gateway:8080
          - auth-service:8081
          - catalog-service:8082
          - cart-service:8083
          - inventory-service:8084
          - order-service:8085
          - payment-service:8086
          - shipping-service:8087
          - audit-service:8088
          - external-payment-simulator:8090
