server:
  port: ${SERVER_PORT:8088}
  shutdown: graceful
spring:
  application:
    name: audit-service
  lifecycle:
    timeout-per-shutdown-phase: 30s
  r2dbc:
    url: ${R2DBC_URL:r2dbc:postgresql://localhost:5432/audit_db}
    username: ${DB_USERNAME:marketplace}
    password: ${DB_PASSWORD:marketplace}
    pool:
      initial-size: 1
      max-size: 15
      max-acquire-time: 5s
  flyway:
    url: ${FLYWAY_URL:jdbc:postgresql://localhost:5432/audit_db}
    user: ${DB_USERNAME:marketplace}
    password: ${DB_PASSWORD:marketplace}
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${JWT_ISSUER:http://localhost:8081}
          jwk-set-uri: ${AUTH_JWK_SET_URI:http://localhost:8081/oauth2/jwks}
          audiences:
            - ${JWT_AUDIENCE:marketplace-api}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      auto-offset-reset: earliest
      enable-auto-commit: false
    listener:
      ack-mode: record
      immediate-stop: false
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      probes:
        enabled: true
logging:
  structured:
    format:
      console: logstash
