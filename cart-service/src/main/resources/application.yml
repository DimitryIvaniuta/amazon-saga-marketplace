server:
  port: ${SERVER_PORT:8083}
  shutdown: graceful
spring:
  application.name: cart-service
  lifecycle.timeout-per-shutdown-phase: 30s
  r2dbc:
    url: ${R2DBC_URL:r2dbc:postgresql://localhost:5432/cart_db}
    username: ${DB_USERNAME:marketplace}
    password: ${DB_PASSWORD:marketplace}
    pool: { initial-size: 2, max-size: 20, max-acquire-time: 5s }
  flyway:
    url: ${FLYWAY_URL:jdbc:postgresql://localhost:5432/cart_db}
    user: ${DB_USERNAME:marketplace}
    password: ${DB_PASSWORD:marketplace}
  security.oauth2.resourceserver.jwt.issuer-uri: ${JWT_ISSUER:http://localhost:8081}
  security.oauth2.resourceserver.jwt.jwk-set-uri: ${AUTH_JWK_SET_URI:http://localhost:8081/oauth2/jwks}
  security.oauth2.resourceserver.jwt.audiences[0]: ${JWT_AUDIENCE:marketplace-api}
management:
  endpoints.web.exposure.include: health,info,prometheus,metrics
  endpoint.health.probes.enabled: true
logging.structured.format.console: logstash
