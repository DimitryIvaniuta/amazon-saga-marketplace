server:
  port: ${SERVER_PORT:8080}
  shutdown: graceful
spring:
  application:
    name: api-gateway
  lifecycle:
    timeout-per-shutdown-phase: 30s
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${JWT_ISSUER:http://localhost:8081}
          jwk-set-uri: ${AUTH_JWK_SET_URI:http://localhost:8081/oauth2/jwks}
          audiences:
            - ${JWT_AUDIENCE:marketplace-api}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: ${GATEWAY_REDIS_TIMEOUT:250ms}
  cloud:
    gateway:
      server:
        webflux:
          httpclient:
            connect-timeout: ${GATEWAY_CONNECT_TIMEOUT_MS:1000}
            response-timeout: ${GATEWAY_RESPONSE_TIMEOUT:5s}
            pool:
              type: fixed
              max-connections: ${GATEWAY_MAX_CONNECTIONS:500}
              acquire-timeout: ${GATEWAY_POOL_ACQUIRE_TIMEOUT_MS:1000}
          default-filters:
            - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin
          routes:
            - id: auth
              uri: ${AUTH_SERVICE_URL:http://localhost:8081}
              predicates: [ Path=/api/auth/**,/oauth2/jwks ]
            - id: catalog
              uri: ${CATALOG_SERVICE_URL:http://localhost:8082}
              predicates: [ Path=/api/catalog/**,/api/admin/catalog/** ]
              metadata:
                connect-timeout: ${CATALOG_CONNECT_TIMEOUT_MS:500}
                response-timeout: ${CATALOG_RESPONSE_TIMEOUT_MS:1500}
              filters:
                - name: RequestRateLimiter
                  args:
                    redis-rate-limiter.replenishRate: ${CATALOG_ROUTE_RATE:5000}
                    redis-rate-limiter.burstCapacity: ${CATALOG_ROUTE_BURST:10000}
                    redis-rate-limiter.requestedTokens: 1
                    key-resolver: "#{@catalogRouteKeyResolver}"
                - name: RequestRateLimiter
                  args:
                    redis-rate-limiter.replenishRate: 50
                    redis-rate-limiter.burstCapacity: 100
                    key-resolver: "#{@principalKeyResolver}"
                - name: RequestRateLimiter
                  args:
                    redis-rate-limiter.replenishRate: ${CATALOG_HOT_KEY_RATE:500}
                    redis-rate-limiter.burstCapacity: ${CATALOG_HOT_KEY_BURST:1000}
                    redis-rate-limiter.requestedTokens: 1
                    key-resolver: "#{@catalogResourceKeyResolver}"
            - id: cart
              uri: ${CART_SERVICE_URL:http://localhost:8083}
              predicates: [ Path=/api/cart/** ]
            - id: inventory
              uri: ${INVENTORY_SERVICE_URL:http://localhost:8084}
              predicates: [ Path=/api/admin/inventory/** ]
            - id: orders
              uri: ${ORDER_SERVICE_URL:http://localhost:8085}
              predicates: [ Path=/api/orders/** ]
            - id: payments
              uri: ${PAYMENT_SERVICE_URL:http://localhost:8086}
              predicates: [ Path=/api/payments/**,/api/admin/payments/** ]
            - id: shipping
              uri: ${SHIPPING_SERVICE_URL:http://localhost:8087}
              predicates: [ Path=/api/shipping/**,/api/admin/shipping/** ]
            - id: audit
              uri: ${AUDIT_SERVICE_URL:http://localhost:8088}
              predicates: [ Path=/api/admin/audit/** ]
management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      probes:
        enabled: true
logging:
  structured:
    format:
      console: logstash
